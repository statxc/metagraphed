name: release-please

# Conventional-commit-driven release automation (#394). On every push to main,
# release-please maintains a "Release PR" per component (packages/client → npm,
# python → PyPI, "." → the hosted platform) that bumps the SemVer + regenerates
# that component's CHANGELOG.md from the conventional commits. Merging a Release
# PR tags the component (e.g. client-v0.3.0) and creates the GitHub Release with
# the generated notes. release-please then dispatches the OIDC publish workflows
# (publish-client / publish-python) via workflow_dispatch — see the Dispatch steps
# below. A tag-push trigger can't be used: GITHUB_TOKEN-created tags don't fire
# workflows, and the validate gate requires GITHUB_REF=refs/heads/main. Commits are
# already Conventional Commits, so the changelog is generated, not hand-maintained.
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  actions: write # dispatch publish-client / publish-python after a release

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      # release-please creates the component tag + GitHub Release with GITHUB_TOKEN,
      # which (by GitHub's recursion-prevention rule) does NOT fire push/tag-based
      # workflows. workflow_dispatch IS exempt from that rule, so we explicitly
      # dispatch the OIDC publish workflows here, telling them release-please
      # already created the tag/release. Without this, merging a Release PR would
      # silently never publish.
      - name: Dispatch npm publish
        if: ${{ steps.release.outputs['packages/client--release_created'] == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run publish-client.yml --ref main -f released_by_release_please=true

      - name: Dispatch PyPI publish
        if: ${{ steps.release.outputs['python--release_created'] == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run publish-python.yml --ref main -f released_by_release_please=true
