name: Publish Cloudflare Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_mode:
        description: "Use publish for real R2/KV/Worker deployment; use dry-run for validation only."
        required: true
        default: publish
        type: choice
        options:
          - publish
          - dry-run

permissions:
  contents: read

concurrency:
  group: publish-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      - name: Setup uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Install
        run: npm ci

      - name: Prepare reviewed publish artifacts
        run: |
          npm run artifacts:prepare-local
          npm run r2:manifest

      - name: Stage reviewed publish artifacts
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/publish-artifacts"
          cp -R public "$RUNNER_TEMP/publish-artifacts/public"
          mkdir -p "$RUNNER_TEMP/publish-artifacts/dist"
          if [ -d dist/metagraph-r2 ]; then
            cp -R dist/metagraph-r2 "$RUNNER_TEMP/publish-artifacts/dist/metagraph-r2"
          fi

      - name: Upload reviewed publish artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cloudflare-publish-artifacts
          path: ${{ runner.temp }}/publish-artifacts
          if-no-files-found: error
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs: refresh
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Download reviewed publish artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: cloudflare-publish-artifacts
          path: ${{ runner.temp }}/publish-artifacts

      - name: Restore reviewed publish artifacts
        run: |
          set -euo pipefail
          find "$RUNNER_TEMP/publish-artifacts" -type l -print -quit | grep -q . && {
            echo "::error::Refusing to restore artifact containing symbolic links."
            exit 1
          }
          rm -rf public/metagraph dist/metagraph-r2
          cp -R "$RUNNER_TEMP/publish-artifacts/public/metagraph" public/metagraph
          if [ -d "$RUNNER_TEMP/publish-artifacts/dist/metagraph-r2" ]; then
            mkdir -p dist
            cp -R "$RUNNER_TEMP/publish-artifacts/dist/metagraph-r2" dist/metagraph-r2
          fi

      - name: Validate registry
        run: npm run validate

      - name: Test
        run: npm test

      - name: Validate Cloudflare backend
        run: |
          npm run validate:schemas
          npm run validate:api
          npm run validate:openapi
          npm run validate:types
          npm run validate:artifact-budgets
          npm run validate:docs
          npm run validate:intake
          npm run validate:workflows
          npm run cloudflare:verify:dry-run
          npm run r2:manifest:dry-run
          npm run r2:download:dry-run
          npm run kv:publish:dry-run
          npm run worker:deploy:dry-run
        env:
          METAGRAPH_REQUIRE_KV_BINDING: ${{ secrets.METAGRAPH_KV_NAMESPACE_ID != '' && '1' || '0' }}

      - name: Public-safety scan
        run: npm run scan:public-safety

      - name: Validate private boundary
        run: npm run validate:private-boundary

      - name: Check Cloudflare publishing secrets
        id: cloudflare-secrets
        run: |
          set -euo pipefail
          publish_mode="${PUBLISH_MODE:-publish}"
          dry_run="false"
          if [ "$publish_mode" = "dry-run" ]; then
            dry_run="true"
          fi

          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && [ -n "$METAGRAPH_KV_NAMESPACE_ID" ]; then
            echo "kv_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "kv_publish=false" >> "$GITHUB_OUTPUT"
          fi

          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"

          if [ "$dry_run" != "true" ] && { [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; }; then
            echo "::error::CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID are required for main publish runs. Use workflow_dispatch publish_mode=dry-run for validation-only runs."
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          METAGRAPH_KV_NAMESPACE_ID: ${{ secrets.METAGRAPH_KV_NAMESPACE_ID }}
          PUBLISH_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_mode || 'publish' }}

      - name: Upload artifact history to R2
        if: steps.cloudflare-secrets.outputs.publish == 'true' && steps.cloudflare-secrets.outputs.dry_run != 'true'
        run: npm run r2:upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          METAGRAPH_ALLOW_R2_UPLOAD: "1"
          METAGRAPH_R2_UPLOAD_HISTORY: "1"

      - name: Publish KV latest pointer
        if: steps.cloudflare-secrets.outputs.kv_publish == 'true' && steps.cloudflare-secrets.outputs.dry_run != 'true'
        run: npm run kv:publish
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          METAGRAPH_KV_NAMESPACE_ID: ${{ secrets.METAGRAPH_KV_NAMESPACE_ID }}
          METAGRAPH_ALLOW_KV_WRITE: "1"

      - name: Deploy Worker
        if: steps.cloudflare-secrets.outputs.publish == 'true' && steps.cloudflare-secrets.outputs.dry_run != 'true'
        run: ./node_modules/.bin/wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke deployed API
        if: steps.cloudflare-secrets.outputs.publish == 'true' && steps.cloudflare-secrets.outputs.dry_run != 'true'
        run: npm run smoke:live
        env:
          METAGRAPH_LIVE_BASE_URL: https://metagraph.sh
